<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="'Pretendard', 'Noto Sans KR', 'Malgun Gothic', system-ui, -apple-system, sans-serif">
  <!-- 배경 -->
  <rect width="1100" height="760" fill="#FFFFFF"/>

  <!-- 화살표 정의 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arrow-bidir-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arrow-bidir-start" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#374151"/>
    </marker>
    <marker id="arrow-tunnel" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="550" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">
    PPE-Safence 시스템 아키텍처
  </text>
  <text x="550" y="68" text-anchor="middle" font-size="13" fill="#6B7280">
    산업 현장 PPE 미착용 감지 시스템 — Jetson 보드 + Flask API + 관리자 클라이언트
  </text>

  <!-- ① WPF 관리자 클라이언트 -->
  <g>
    <rect x="380" y="100" width="340" height="86" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <text x="550" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#1E40AF">WPF 관리자 클라이언트</text>
    <text x="550" y="152" text-anchor="middle" font-size="12" fill="#374151">Windows · MaterialDesignThemes (CrackdownSetting)</text>
    <text x="550" y="172" text-anchor="middle" font-size="12" fill="#374151">JWT 토큰 인증 · 카메라 영상 시청 · 구역 매핑</text>
  </g>

  <!-- 화살표: WPF ↔ Flask API -->
  <line x1="550" y1="186" x2="550" y2="232" stroke="#374151" stroke-width="2"
        marker-start="url(#arrow-bidir-start)" marker-end="url(#arrow-bidir-end)"/>
  <text x="565" y="205" font-size="11" fill="#374151" font-weight="600">HTTPS · JWT</text>
  <text x="565" y="220" font-size="11" fill="#6B7280">WebSocket (Socket.IO)</text>

  <!-- ② AWS EC2 박스 (Flask + MariaDB) -->
  <g>
    <rect x="80" y="240" width="940" height="250" rx="14" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="105" y="268" font-size="13" font-weight="700" fill="#111827">☁ AWS EC2 (43.200.27.117)</text>

    <!-- Flask API -->
    <rect x="140" y="290" width="370" height="180" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="325" y="320" text-anchor="middle" font-size="16" font-weight="700" fill="#1E3A8A">Flask API</text>
    <text x="325" y="342" text-anchor="middle" font-size="12" fill="#1E40AF">포트 5002 · Python 3.10</text>
    <line x1="160" y1="356" x2="490" y2="356" stroke="#93C5FD" stroke-width="1"/>
    <text x="160" y="380" font-size="12.5" fill="#1F2937">• JWT 토큰 인증 + RBAC 권한 모델</text>
    <text x="160" y="402" font-size="12.5" fill="#1F2937">• REST API + Swagger UI (/apidocs/)</text>
    <text x="160" y="424" font-size="12.5" fill="#1F2937">• 블루투스 페어링 패턴 area upsert</text>
    <text x="160" y="446" font-size="12.5" fill="#1F2937">• Socket.IO 실시간 알림 / CORS</text>
    <text x="160" y="464" font-size="11" fill="#6B7280">→ Jetson 보드 호출 (JETSON_BASE_URL)</text>

    <!-- Flask ↔ DB 연결 -->
    <line x1="510" y1="380" x2="590" y2="380" stroke="#374151" stroke-width="2"
          marker-start="url(#arrow-bidir-start)" marker-end="url(#arrow-bidir-end)"/>
    <text x="550" y="372" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">SQLAlchemy</text>

    <!-- MariaDB -->
    <rect x="590" y="290" width="370" height="180" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="775" y="320" text-anchor="middle" font-size="16" font-weight="700" fill="#065F46">MariaDB</text>
    <text x="775" y="342" text-anchor="middle" font-size="12" fill="#047857">capstone_db · 정규화된 5개 테이블</text>
    <line x1="610" y1="356" x2="940" y2="356" stroke="#6EE7B7" stroke-width="1"/>
    <text x="610" y="380" font-size="12.5" fill="#1F2937">• areas (구역 + camera_key 영구 식별자)</text>
    <text x="610" y="402" font-size="12.5" fill="#1F2937">• users · user_areas (N:M 다중 구역)</text>
    <text x="610" y="424" font-size="12.5" fill="#1F2937">• violations (위반 이력)</text>
    <text x="610" y="446" font-size="12.5" fill="#1F2937">• alarms (실시간 알림 큐)</text>
  </g>

  <!-- 화살표: Flask → Jetson (HTTP 요청) -->
  <line x1="500" y1="490" x2="500" y2="565" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="380" y="510" font-size="12" fill="#374151" font-weight="600">HTTP 요청</text>
  <text x="380" y="525" font-size="11" fill="#6B7280">JETSON_BASE_URL</text>
  <text x="380" y="540" font-size="11" fill="#6B7280">/cameras · /stream/&lt;name&gt;</text>

  <!-- 화살표: Jetson → AWS (SSH 리버스 터널) -->
  <line x1="600" y1="565" x2="600" y2="490" stroke="#7C3AED" stroke-width="2.5"
        stroke-dasharray="6 4" marker-end="url(#arrow-tunnel)"/>
  <text x="615" y="510" font-size="12" fill="#7C3AED" font-weight="600">SSH 리버스 터널</text>
  <text x="615" y="525" font-size="11" fill="#6D28D9">autossh + systemd</text>
  <text x="615" y="540" font-size="11" fill="#6D28D9">자동 복구 (트리플 안전망)</text>

  <!-- ③ Jetson Orin Nano 박스 -->
  <g>
    <rect x="160" y="570" width="780" height="170" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
    <text x="550" y="600" text-anchor="middle" font-size="16" font-weight="700" fill="#5B21B6">
      🖥 Jetson Orin Nano · 현장 단말 (Edge Device)
    </text>
    <text x="550" y="620" text-anchor="middle" font-size="11.5" fill="#6B21A8">
      ipTIME 라우터 사설망 (192.168.45.x) · Tailscale 백업 경로 (100.113.160.25)
    </text>

    <!-- PPE Detection Server -->
    <rect x="200" y="635" width="700" height="90" rx="8" fill="#DDD6FE" stroke="#6D28D9" stroke-width="1.5"/>
    <text x="550" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="#4C1D95">
      PPE Detection Server (포트 5001)
    </text>
    <text x="220" y="683" font-size="12" fill="#1F2937">• GET /cameras → 카메라 목록 + 영구 key 반환</text>
    <text x="220" y="700" font-size="12" fill="#1F2937">• GET /stream/&lt;cam_name&gt; → MJPEG 멀티파트 스트리밍</text>
    <text x="220" y="717" font-size="12" fill="#1F2937">• YOLO-World + YOLO11n-Pose (TensorRT 가속) · USB / CSI / RealSense 자동 인식</text>
  </g>

  <!-- 범례 (오른쪽 하단) -->
  <g>
    <rect x="800" y="100" width="220" height="86" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="815" y="118" font-size="11" font-weight="700" fill="#111827">범례</text>
    <line x1="815" y1="132" x2="845" y2="132" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="855" y="136" font-size="10.5" fill="#374151">데이터 요청 (HTTP)</text>
    <line x1="815" y1="152" x2="845" y2="152" stroke="#7C3AED" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow-tunnel)"/>
    <text x="855" y="156" font-size="10.5" fill="#7C3AED">SSH 리버스 터널</text>
    <line x1="815" y1="172" x2="845" y2="172" stroke="#374151" stroke-width="2"
          marker-start="url(#arrow-bidir-start)" marker-end="url(#arrow-bidir-end)"/>
    <text x="855" y="176" font-size="10.5" fill="#374151">양방향 통신</text>
  </g>
</svg>
